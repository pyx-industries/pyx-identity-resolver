name: Docker

# Pipeline behaviour:
#  - Push to `master` (paths-based): builds and pushes `:master` and
#    `:master-<sha>` images (plus matching `-serverless` variants).
#    Use for tracking the trunk's latest state.
#  - Push of a `v*` tag (e.g. `v4.0.0`, `v4.1.0-rc.1`): builds and pushes
#    the semver-tagged image plus its `-serverless` counterpart. The
#    `:latest` pointer (and `:latest-serverless`) moves only for
#    non-pre-release tags.
#  - `workflow_dispatch` with a `version` input: same as a tag push but
#    triggered manually.
#
# See: documentation/docs/contributing/release-process.md for the full
# release workflow.

on:
  push:
    branches:
      - master
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/package-lock.json'
      - 'Dockerfile'
      - 'Dockerfile.serverless'
      - 'docker-compose.yaml'
      - 'version.json'
      - '.github/workflows/docker.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to tag this build with (e.g. 4.0.0). Omit to push only the branch tag.'
        required: false
        type: string

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    if: github.repository_owner == 'pyx-industries'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard image: served by Node, used for container/VM/K8s
          # deployments.
          - variant: standard
            dockerfile: Dockerfile
            suffix: ''
          # Serverless image: used for AWS Lambda container deployments.
          - variant: serverless
            dockerfile: Dockerfile.serverless
            suffix: '-serverless'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pin to the SHA that triggered the workflow so a parallel push
          # to master (or a re-tag) cannot move the working tree under us.
          ref: ${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # `suffix` is appended to every tag so the standard image
          # gets unsuffixed tags (`4.0.0`, `latest`) and the serverless
          # image gets `-serverless`-suffixed tags (`4.0.0-serverless`,
          # `latest-serverless`).
          flavor: |
            latest=false
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,format=short,prefix=master-,enable=${{ github.ref == 'refs/heads/master' }}
            type=match,pattern=v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-pre') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && !contains(inputs.version, '-rc') && !contains(inputs.version, '-alpha') && !contains(inputs.version, '-beta') && !contains(inputs.version, '-pre') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
